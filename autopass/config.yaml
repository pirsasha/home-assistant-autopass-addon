name: Автопропуск
version: "0.19.9"
slug: autopass
description: Управление автомобильными пропусками и проверка номеров
url: https://github.com/pirsasha/home-assistant-autopass-addon
arch:
  - aarch64
  - amd64
image: ghcr.io/pirsasha/{arch}-autopass
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:car-key
panel_title: Автопропуск
homeassistant_api: true
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Локальный веб-интерфейс и API (публикуйте порт только при необходимости)
map:
  - addon_config:rw
options:
  api_key: ""
  local_access_enabled: false
schema:
  api_key: password?
  local_access_enabled: bool
